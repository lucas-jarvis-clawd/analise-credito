<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Sistema de Análise de Crédito - Texcotton</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/texcotton-theme.css}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>">
</head>

<nav th:fragment="navbar(perfil)" class="navbar navbar-expand-lg navbar-texcotton">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-cash-coin"></i>
            <span>Texcotton</span>
            <span style="font-size: 0.6rem; opacity: 0.7; font-weight: 400; margin-left: 0.3rem;">Análise de Crédito</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <div class="navbar-nav ms-auto d-flex align-items-center gap-2">
                <a class="nav-link" th:href="@{/analise/kanban}">
                    <i class="bi bi-kanban"></i> Dashboard
                </a>
                <a class="nav-link" th:href="@{/importacao}">
                    <i class="bi bi-upload"></i> Importar
                </a>
                <a class="nav-link" th:href="@{/configuracao}">
                    <i class="bi bi-gear"></i> Configuração
                </a>

                <div th:if="${perfil}" class="user-badge ms-3">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${perfil}">FINANCEIRO</span>
                </div>
            </div>
        </div>
    </header>
</div>

<footer th:fragment="footer" class="footer mt-auto py-3" style="background: linear-gradient(to top, #000 0%, #1a1a1a 100%); border-top: 2px solid var(--tx-gold);">
    <div class="container text-center">
        <p class="mb-1" style="color: var(--tx-gold); font-family: var(--font-display); font-size: 0.85rem; font-weight: 600;">
            Texcotton
        </p>
        <p class="mb-0" style="color: rgba(255, 255, 255, 0.6); font-size: 0.7rem;">
            Sistema de Análise de Crédito © 2026 | Todos os direitos reservados
        </p>
    </div>
</footer>

<!-- Scripts Fragment -->
<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</div>
</html>
