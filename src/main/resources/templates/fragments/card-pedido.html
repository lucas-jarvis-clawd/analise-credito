<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Fragment de Card Kanban - Grupos Econômicos -->
<th:block th:fragment="kanban-cards(analises)">
    <div th:if="${analises == null or analises.isEmpty()}" class="espacamento-vazio">
        <i class="bi bi-inbox"></i>
        Nenhuma análise encontrada
    </div>

    <div th:each="grupo : ${analises}"
         class="kanban-card"
         draggable="true"
         th:attr="data-analise-id=${grupo.analisePrincipalId}"
         th:id="'card-' + ${grupo.analisePrincipalId}">

        <!-- Cabeçalho - Grupo Econômico -->
        <div class="card-cliente">
            <i class="bi bi-building"></i> <span th:text="${grupo.grupoNome}">Nome do Grupo</span>
        </div>

        <!-- Lista de Clientes -->
        <div class="card-clientes-grupo mb-2">
            <small class="text-muted">
                <i class="bi bi-people"></i> Clientes:
            </small>
            <ul class="list-unstyled mb-0 mt-1" style="font-size: 0.85rem;">
                <li th:each="razaoSocial : ${grupo.clientesRazaoSocial}">
                    <i class="bi bi-dot"></i>
                    <span th:text="${razaoSocial}">Razão Social</span>
                </li>
            </ul>
        </div>

        <!-- Info Consolidada do Grupo -->
        <div class="card-info">
            <span>
                <i class="bi bi-file-text"></i>
                <strong th:text="${grupo.quantidadePedidos}">0</strong>
                <span th:text="${grupo.quantidadePedidos == 1} ? 'pedido' : 'pedidos'">pedidos</span>
            </span>
            <span>
                <i class="bi bi-currency-dollar"></i>
                <strong th:text="${#numbers.formatDecimal(grupo.valorTotal, 1, 'POINT', 2, 'COMMA')}">0,00</strong>
            </span>
        </div>

        <!-- SLA e UF Badges -->
        <div class="card-badges">
            <!-- SLA Badge -->
            <span th:if="${grupo.diasEmAnalise != null}"
                  class="badge-tc"
                  th:classappend="${grupo.diasEmAnalise >= 3} ? 'bg-danger text-white' : (${grupo.diasEmAnalise >= 1} ? 'bg-warning' : 'bg-secondary text-white')"
                  th:attr="title=${grupo.diasEmAnalise >= 3} ? 'ATRASADO - SLA excedido' : 'Dias em análise'">
                <i class="bi bi-clock"></i>
                <span th:text="${grupo.diasEmAnalise} + ' dia' + (${grupo.diasEmAnalise != 1} ? 's' : '')">0 dias</span>
            </span>

            <!-- UF Badge -->
            <span th:if="${grupo.uf != null and !grupo.uf.isEmpty()}"
                  class="badge-tc"
                  style="background: var(--tc-primary); color: var(--tc-dark);">
                <i class="bi bi-geo-alt"></i>
                <span th:text="${grupo.uf}">SP</span>
            </span>
        </div>

        <!-- Pior Score do Grupo -->
        <div class="card-badges" th:if="${grupo.piorScore != null}">
            <span class="badge-tc badge-score"
                  th:classappend="${grupo.piorScore >= 700} ? 'score-alto' : (${grupo.piorScore >= 400} ? 'score-medio' : 'score-baixo')"
                  th:text="'Pior Score: ' + ${grupo.piorScore}">Pior Score: 0</span>
        </div>

        <!-- Alertas Consolidados -->
        <div class="card-badges" th:if="${grupo.alertasConsolidados != null and !grupo.alertasConsolidados.isEmpty()}">
            <span th:each="alert : ${grupo.alertasConsolidados}"
                  class="badge-tc badge-perigo"
                  th:text="${alert}">Alerta</span>
        </div>

        <!-- Botão Analisar -->
        <a th:href="@{/analise/{id}(id=${grupo.analisePrincipalId})}"
           class="btn btn-tc btn-tc-primary btn-sm mt-3"
           style="width: 100%;">
            <i class="bi bi-clipboard-check"></i> Analisar
        </a>
    </div>
</th:block>
</html>
