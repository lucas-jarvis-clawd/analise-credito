<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<span th:fragment="badge(score)"
      class="badge-texcotton badge-score"
      style="font-size: 1.1rem;"
      th:classappend="${score >= 700} ? 'score-alto' :
                     (${score >= 400} ? 'score-medio' : 'score-baixo')"
      th:text="${score != null ? 'Score: ' + score : 'Score: N/D'}">
    Score
</span>
</html>
