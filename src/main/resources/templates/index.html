<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tex Cotton - Sistema de Análise de Crédito</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/texcotton-theme.css}">
</head>
<body class="login-pagina">
    <div class="login-card">
        <!-- Cabeçalho -->
        <div class="login-header">
            <div class="login-logo">
                <i class="bi bi-cash-coin"></i>
                <h1>TEX COTTON</h1>
                <p>Análise de Crédito</p>
            </div>
        </div>

        <!-- Corpo -->
        <div class="login-body">
            <h2 class="login-titulo">
                Selecione seu perfil para continuar
            </h2>

            <form action="/perfil/selecionar" method="post">
                <button type="submit" name="perfil" value="FINANCEIRO" class="btn-perfil">
                    <i class="bi bi-calculator"></i>
                    <span>Entrar como Financeiro</span>
                </button>

                <button type="submit" name="perfil" value="COMERCIAL" class="btn-perfil">
                    <i class="bi bi-person-badge"></i>
                    <span>Entrar como Comercial</span>
                </button>
            </form>

            <div class="login-divisor"></div>

            <!-- Área Administrativa -->
            <div class="login-admin">
                <p class="login-admin-titulo">Área Administrativa</p>
                <div class="login-admin-links">
                    <a th:href="@{/importacao}" class="link-admin">
                        <i class="bi bi-file-earmark-arrow-up"></i>
                        Importação
                    </a>
                    <a th:href="@{/configuracao}" class="link-admin">
                        <i class="bi bi-gear"></i>
                        Configuração
                    </a>
                </div>
            </div>
        </div>
    </div>

    <p class="login-footer">
        <strong>Tex Cotton</strong> Sistema de Análise de Crédito © 2026<br>
        Versão 1.0.0 | Todos os direitos reservados
    </p>

    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
